interface:
  display_name: "Module Notes Maintainer"
  short_description: "Maintain module notes, runbooks, solved issues, and constraints"
  default_prompt: "Use $module-notes-maintainer to maintain module_notes by module/function: keep module_notes/README.md as the only index, keep semantic common files for shared facts, put cross-module solved problems in common/corrections.md, keep function README files as short first-screen entrypoints, put detailed continuation state in handover.md, reusable commands in runbook.md, feature solved issues in corrections.md, durable constraints in constraints.md, and run the audit script after migrations or broad cleanup."
